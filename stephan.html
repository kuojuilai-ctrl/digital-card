<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stephan Kuttner Potts | Stanev Potts Architects</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #ffffff; /* 讓整體畫面像實體卡片一樣純粹乾淨 */
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .card-wrapper {
            max-width: 360px;
            width: 85%;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
            letter-spacing: 0.08em; /* 保持精緻的大字距 */
        }
        
        /* 圖片 LOGO 區塊：完美讀取你上傳的 logo.png */
        .logo-container {
            margin-bottom: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-container img {
            max-width: 180px; /* 控制 Logo 在手機螢幕上的優雅寬度 */
            height: auto;
            display: block;
        }
        
        h1 { 
            font-size: 26px; 
            margin: 0 0 12px 0; 
            font-weight: 500; 
            color: #111;
            text-transform: uppercase;
        }
        .title { 
            color: #666; 
            font-size: 13px; 
            margin-bottom: 70px;
            font-weight: 300;
            line-height: 1.5;
        }
        
        /* 底部公司資訊：依據實體卡片比例微調 */
        .company-info {
            font-size: 11px;
            color: #888;
            line-height: 1.8;
            margin-bottom: 60px;
            font-weight: 300;
        }
        .company-name {
            font-size: 13px;
            font-weight: 500;
            color: #111;
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }
        .company-link {
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.3s;
        }
        .company-link:hover {
            color: #111;
            border-bottom: 1px solid #111;
        }
        
        /* 極簡實心黑底 SAVE CONTACT 按鈕 */
        .btn {
            display: block;
            border: 1px solid #111;
            background-color: #111;
            color: #fff;
            text-decoration: none;
            padding: 16px 0;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.15em;
            transition: all 0.3s ease;
        }
        .btn:hover { 
            background-color: #fff;
            color: #111;
        }
    </style>
</head>
<body>
<div class="card-wrapper">
    
    <div class="logo-container">
        <img src="logo.png" alt="Stanev Potts Architects Logo">
    </div>
    
    <h1>Stephan Kuttner Potts</h1>
    <div class="title">Principal AIA</div>
    
    <div class="company-info">
        <div class="company-name">Stanev Potts Architects</div>
        <div>1103 Spruce St, Philadelphia, PA 19107</div>
        <div><a class="company-link" href="https://www.sparchs.com" target="_blank">www.sparchs.com</a></div>
    </div>
    
    <a href="stephan.vcf" class="btn">SAVE CONTACT</a>
</div>
</body>
</html>
